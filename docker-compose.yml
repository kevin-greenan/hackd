services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hackd
      POSTGRES_PASSWORD: hackd_dev_password
      POSTGRES_DB: hackd
    ports:
      - "5432:5432"
    volumes:
      - hackd-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackd -d hackd"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
    environment:
      DATABASE_URL: postgresql://hackd:hackd_dev_password@db:5432/hackd?schema=public
      APP_URL: http://localhost:3000
      SESSION_SECRET: local-dev-session-secret-change-before-production
      SEED_ADMIN_EMAIL: admin@hackd.local
      SEED_ADMIN_PASSWORD: change-me-in-development
      SEED_LEARNER_EMAIL: learner@hackd.local
      SEED_LEARNER_PASSWORD: change-me-in-development
      FILE_STORAGE_DIR: /app/data/uploads
      MAX_ATTACHMENT_BYTES: "5242880"
      RUNTIME_RUNNER_URL: http://runner:4010
      CHALLENGE_PUBLIC_HOST: http://localhost
    ports:
      - "3000:3000"
    volumes:
      - hackd-file-uploads:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy
      runner:
        condition: service_started
    command: sh -c "./node_modules/.bin/prisma migrate deploy && ./node_modules/.bin/tsx prisma/seed.ts && node server.js"

  runner:
    build:
      context: .
    environment:
      RUNTIME_RUNNER_PORT: "4010"
      RUNTIME_NETWORK: hackd-runtime
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: node scripts/runtime-runner.mjs

volumes:
  hackd-postgres-data:
  hackd-file-uploads:
